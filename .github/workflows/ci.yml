name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python backend tests ──────────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=custom_components/harr \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Playwright UI tests ────────────────────────────────────────────────────
  #
  # These tests require:
  #   1. A running HA instance with harr installed
  #   2. Each service (Radarr, Sonarr, …) reachable so the harr proxy can
  #      forward requests and the frontend tabs are actually visible.
  #
  # Rather than real media-server instances, we start a tiny Python mock that
  # responds with empty-but-valid JSON to every request.  This is enough for:
  #   - /api/harr/config to report all services as configured
  #   - each tab to load (grid renders as empty, no errors)
  #   - modal/search interactions that POST to the proxy
  #
  # Home Assistant runs as a GitHub Actions service container so GitHub manages
  # its lifecycle.  Because service containers start before steps (before
  # checkout), the harr integration can't be bind-mounted at service startup.
  # Instead, we use docker cp / docker exec to inject files directly into the
  # running container and then restart it so HA boots with the integration loaded.
  #
  # Networking: the HA container is on a bridge network, so mock servers must
  # listen on 0.0.0.0 and HA's config must reference them via
  # host.docker.internal (mapped to the Docker bridge gateway).
  # ──────────────────────────────────────────────────────────────────────────
  ui-tests:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest

    services:
      home-assistant:
        image: homeassistant/home-assistant:2026.3.1
        ports:
          - 127.0.0.1:8123:8123
        options: >-
          --add-host=host.docker.internal:host-gateway

    steps:
      - uses: actions/checkout@v4

      # ── Mock service servers ──────────────────────────────────────────────
      # One generic JSON mock server covers all upstream services.
      # Each service gets its own port matching its default.
      # Binds to 0.0.0.0 so the HA container can reach them via
      # host.docker.internal (the Docker bridge interface).
      - name: Write mock server script
        run: |
          cat > /tmp/mock_server.py << 'PY'
          #!/usr/bin/env python3
          """Minimal HTTP mock: returns [] for GETs, {} for POSTs/PUTs/DELETEs."""
          import http.server, json, sys

          class H(http.server.BaseHTTPRequestHandler):
              def _respond(self, body=b"[]"):
                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(body)
              def do_GET(self):    self._respond(b"[]")
              def do_POST(self):   self._respond(b"{}")
              def do_PUT(self):    self._respond(b"{}")
              def do_DELETE(self): self._respond(b"{}")
              def log_message(self, *a): pass   # silence access log

          http.server.HTTPServer(("0.0.0.0", int(sys.argv[1])), H).serve_forever()
          PY

      - name: Start mock service servers
        run: |
          python3 /tmp/mock_server.py 7878 &   # Radarr
          python3 /tmp/mock_server.py 8989 &   # Sonarr
          python3 /tmp/mock_server.py 5055 &   # Seerr / Jellyseerr
          python3 /tmp/mock_server.py 6767 &   # Bazarr
          python3 /tmp/mock_server.py 8080 &   # qBittorrent
          python3 /tmp/mock_server.py 8085 &   # SABnzbd
          # Wait briefly for them to bind
          sleep 1
          echo "Mock servers started"

      # ── Home Assistant ────────────────────────────────────────────────────
      # The service container started without any custom config (HA is in
      # onboarding mode). Use docker cp / docker exec to inject the harr
      # integration and configuration.yaml directly into the container, then
      # restart it so HA boots with harr loaded.  No volume mount needed —
      # docker cp runs as root inside the container so there is no permission
      # issue with the host filesystem.
      - name: Setup HA config and load harr integration
        run: |
          HA=$(docker ps -qf "ancestor=homeassistant/home-assistant:2026.3.1")

          # Inject harr custom component
          docker exec "$HA" mkdir -p /config/custom_components
          docker cp custom_components/harr "$HA":/config/custom_components/harr

          # Write configuration.yaml (stage locally, then cp into container)
          # Services are referenced via host.docker.internal because HA runs
          # in a bridge-networked container and cannot reach 127.0.0.1 on the host.
          cat > /tmp/configuration.yaml << 'YAML'
          http:
            server_port: 8123
          harr:
            radarr:
              url: "http://host.docker.internal:7878"
              api_key: "mock"
            sonarr:
              url: "http://host.docker.internal:8989"
              api_key: "mock"
            seerr:
              url: "http://host.docker.internal:5055"
              api_key: "mock"
            bazarr:
              url: "http://host.docker.internal:6767"
              api_key: "mock"
            qbittorrent:
              url: "http://host.docker.internal:8080"
              username: "admin"
              password: "mock"
            sabnzbd:
              url: "http://host.docker.internal:8085"
              api_key: "mock"
          YAML
          docker cp /tmp/configuration.yaml "$HA":/config/configuration.yaml

      - name: Restart HA to load harr integration
        run: |
          HA=$(docker ps -qf "ancestor=homeassistant/home-assistant:2026.3.1")
          docker restart "$HA"
          echo "Home Assistant restarted with harr integration"

      # ── Playwright ───────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/ui/package-lock.json

      - name: Install Playwright
        working-directory: tests/ui
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: tests/ui
        env:
          HA_URL: http://localhost:8123
          HA_USER: admin
          HA_PASS: ci-password
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 7

      - name: Stop mock servers
        if: always()
        run: pkill -f mock_server.py 2>/dev/null || true
